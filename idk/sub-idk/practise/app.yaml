apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: embarkx/hello-node:latest
        # env:
        #   - name: APP_MESSAGE
        #     value: "Hello, adding environment variables at production stage!"
        #   - name: DB_PASSWORD
        #     value: "cGFzc3dvcmQ=" # base64 for 'password'
        env:
          - name: ENV_VALUE
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: MESSAGE
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: DB_PASSWORD
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: myapp

spec:
  selector:
    app: myapp

  type: NodePort

  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 32000