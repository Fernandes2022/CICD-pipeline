apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
      - name: service-b
        image: embarkx/tax-service-b:latest
        # env:
        #   - name: APP_MESSAGE
        #     value: "Hello, adding environment variables at production stage!"
        #   - name: DB_PASSWORD
        #     value: "cGFzc3dvcmQ=" # base64 for 'password'
        # env:
        #   - name: ENV_VALUE
        #     valueFrom:
        #       configMapKeyRef:
        #         name: app-config
        #         key: MESSAGE
        #   - name: DB_PASSWORD
        #     valueFrom:
        #       secretKeyRef:
        #         name: db-secret
        #         key: DB_PASSWORD
        ports:
        - containerPort: 4000

---
apiVersion: v1
kind: Service
metadata:
  name: service-b

spec:
  selector:
    app: service-b

  type: ClusterIP

  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
      