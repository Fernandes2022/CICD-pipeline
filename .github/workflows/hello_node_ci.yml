name: Hello Node App To Docker CI

on: 
#   workflow_dispatch:
  push
    # branches:
    #       - main
    # paths:
    #   - 'docker/app1-hello/node'

jobs: 
    build-test:
        runs-on: ubuntu-latest

        steps: 
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '21'

            - name: Install dependencies
              working-directory: docker/app1-hello/node
              run: npm install

            - name: Build and Test
              working-directory: docker/app1-hello/node
              run: npm test

            
            - name: Upload Test Report
              uses: actions/upload-artifact@v4
              with:
                 name: test-report   
                 path: docker/app1-hello/node/target/surefire-reports


    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test

        steps: 
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4   
              with:
                node-version: '21'

            
            - name: Install dependencies
              working-directory: docker/app1-hello/node
              run: npm install

            - name: Build and Test
              working-directory: docker/app1-hello/node
              run: npm test
            
            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_PASSWORD }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with:
                    context: docker/app1-hello/node
                    push: true
                    tags: ${{ secrets.DOCKERHUB_USERNAME }}/hello-node:latest


