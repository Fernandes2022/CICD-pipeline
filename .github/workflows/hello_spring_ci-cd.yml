name: Hello Spring Boot App To AWS EKS

on: 
  workflow_dispatch:
  push
    # branches:
    #       - main
    # paths:
    #   - 'docker/app1-hello/springboot/hello-spring'

jobs: 
    build-test:
        runs-on: ubuntu-latest

        steps: 
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup JDK
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin'
                java-version: '21'
            
            - name: Build and Test(Maven)
              working-directory: docker/app1-hello/springboot/hello-spring
              run: mvn -B clean verify
            
            - name: Upload Test Report
              uses: actions/upload-artifact@v4
              with:
                 name: test-report   
                 path: docker/app1-hello/springboot/hello-spring/target/surefire-reports


    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test

        steps: 
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup JDK
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin'
                java-version: '21'
            
            - name: Build JAR for Docker
              working-directory: docker/app1-hello/springboot/hello-spring
              run: mvn -B clean package -DskipTests
            
            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_PASSWORD }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with:
                    context: docker/app1-hello/springboot/hello-spring
                    push: true
                    tags: ${{ secrets.DOCKERHUB_USERNAME }}/hello-spring:latest





    deploy-aws-eks:
        runs-on: ubuntu-latest
        needs: docker-build-push

        steps: 
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v5.1.1
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: eu-north-1

            - name: Setup kubectl
              uses: azure/setup-kubectl@v4
              # with:
              #   kubectl-version: 1.28.0

            - name: Update kubeconfig for EKS Cluster
              run: |
                aws eks update-kubeconfig --name start-cluster --region eu-north-1

            - name: Verify Connection
              run: kubectl get nodes

            - name: Deploy to AWS (Kubernetes)
              run: kubectl apply -f idk/sub-idk/practise/app.yaml